---
- name: Install Docker + AWS CLI + Prometheus + Grafana
  hosts: ec2
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # ================= Docker + AWS CLI =================
    - name: Install Docker and AWS CLI
      apt:
        name:
          - docker.io
          - awscli
        state: present

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # ================= Prometheus =================
    - name: Install Prometheus
      apt:
        name: prometheus
        state: present

    - name: Start Prometheus
      service:
        name: prometheus
        state: started
        enabled: yes

    # ================= Grafana =================
    - name: Add Grafana GPG key
      apt_key:
        url: https://packages.grafana.com/gpg.key
        state: present

    - name: Add Grafana repository
      apt_repository:
        repo: "deb https://packages.grafana.com/oss/deb stable main"
        state: present

    - name: Update apt cache after adding Grafana repo
      apt:
        update_cache: yes

    - name: Install Grafana
      apt:
        name: grafana
        state: present

    - name: Start Grafana
      service:
        name: grafana-server
        state: started
        enabled: yes