---
- name: Install Docker + AWS CLI on EC2
  hosts: ec2
  become: true
  gather_facts: true        # ← Fixed: boolean true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker and AWS CLI
      apt:
        name:
          - docker.io
          - awscli
        state: present
        update_cache: yes

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
