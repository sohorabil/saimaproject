name: Build → Push to ECR → Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-devops-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          debug: true   # ← Enable debug for now to see logs clearly
          script: |
            echo "🚀 Starting deployment on $(date)..."

            # Use correct registry and image
            IMAGE=${{ needs.build-and-push.outputs.registry }}/my-devops-app:${{ needs.build-and-push.outputs.image_tag }}

            echo "📦 Logging into Amazon ECR..."
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ needs.build-and-push.outputs.registry }}

            echo "🛑 Stopping and removing old container..."
            docker stop myapp || true
            docker rm myapp || true

            echo "📥 Pulling new image: $IMAGE"
            docker pull $IMAGE

            echo "🚀 Starting new container on port 4000..."
            docker run -d \
              --name myapp \
              -p 4000:4000 \
              $IMAGE

            echo "✅ Deployment completed successfully!"
            echo "🌐 App is running at: http://${{ secrets.EC2_HOST }}:4000"