name: Build → Push to ECR → Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-devops-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    # ←←← THIS IS THE IMPORTANT FIX
    secrets: inherit

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            echo "🚀 Starting deployment on $(date)..."

            IMAGE=747549198981.dkr.ecr.ap-southeast-2.amazonaws.com/my-devops-app:${{ needs.build-and-push.outputs.image_tag }}

            # Login to ECR
            aws ecr get-login-password --region ap-southeast-2 | \
              docker login --username AWS --password-stdin 747549198981.dkr.ecr.ap-southeast-2.amazonaws.com

            # Stop & remove old container
            docker stop myapp || true
            docker rm myapp || true

            # Pull and run new container (added pull for safety)
            docker pull $IMAGE

            docker run -d \
              --name myapp \
              -p 3005:3005 \
              $IMAGE

            echo "✅ Deployment complete! Visit http://${{ secrets.EC2_HOST }}:3005"